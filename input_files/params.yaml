# Configuration for aggregation of residential sector

period_step: 5 # Number of years between model periods

# Future model planning periods
model_periods:
  - 2025
  - 2030
  - 2035
  - 2040
  - 2045
  - 2050

weather_year: 2018 # For normalised timeseries data only
base_year: 2022 # Default year to pull data from
timezone: 'EST' # Final synchronised timezone for all timeseries data

data_id_prefix: 'COMHR'
data_version: '001'

# Currency, data costs are exchanged and inflated in post processing
final_currency: 'CAD' # Not configured to output currencies other than CAD yet
final_currency_year: 2020
inflation_index: 'gdp_deflator' # gdp_deflator, general_cpi, energy_and_petroleum, industrial, construction_non_residential

# Other demand electrification factor
# Reduces consumption of all fuels other than electricity by this fraction, and replaces them with electricity by final period
# Canada Energy Futures puts this at around 0.65 from 2020 -> 2050
other_electrification_factor: 0.62
cef_note: "Assumed that 62% of non-electric fuel consumption is 1:1 switched for electricity by 2050, changing linearly (CER, 2023)"
cef_reference: "CER. (2023). Canadas Energy Future Data Appendices [dataset]. https://doi.org/10.35002/ZJR8-8X75"

# NOT CURRENTLY IN USE - just omitting minACF instead
# Annual capacity factor must be less than mean(DSD)/peak(DSD) or the model will be infeasible
# ACF will be clamped to an upper bound of mean(DSD)/peak(DSD) x (1 - acf_buffer)
# Try increasing this if the model is infeasible
# The ACF limit changes if DSD is changed (e.g. during representative day selection/weighting) so a larger buffer is safer
#acf_buffer: 0.05

# Set DSD to zero if less than this times hourly average (i.e. dsd(h) = 0 if dsd(h) < tol * mean(dsd))
# For computational reasons
dsd_tolerance: 0.02

# There might be some tiny residual consumption of e.g., oil for other end uses. We don't really want tiny
# flows in the model as they slow things down without meaningfully changing outcomes, so filter out any 
# secondary energy consumption that's less than this fraction of total energy consumption in any region.
sec_tolerance: 0.05

sqlite_schema: "canoe_dataset_schema.sql"
sqlite_database: "commercial.sqlite"
excel_template: "Template spreadsheet (make a copy).xlsx"
excel_output: "commercial.xlsx"

## Aggregation switches
force_wipe_database: true # Forces clearing of all data in database prior to aggregation
force_generate_weather_maps: false # Force regeneration of weather maps instead of using locally cached versions
force_download: false # Forces downloading data again instead of using cached versions
show_plots: true
include_dsd: true # Aggregating DSDs is slow
include_imports: false # Aggregates dummy import technologies for fuels
include_emissions: false
include_furnace_fans: false # Whether to include electricity consumption of fans in space heating
clone_to_xlsx: false

nrcan_url: "https://oee.nrcan.gc.ca/corporate/statistics/neud/dpa/data_e/downloads/comprehensive/Excel/<y>/com_<r>_e_<t>.xls"
nrcan_reference: 'Natural Resources Canada, (2020). Comprehensive Energy Use Database. https://oee.nrcan.gc.ca/corporate/statistics/neud/dpa/menus/trends/comprehensive_tables/list.cfm'
handbook_reference: 'Natural Resources Canada, (2020). Energy Use Data Handbook Tables. https://oee.nrcan.gc.ca/corporate/statistics/neud/dpa/menus/trends/handbook/tables.cfm'

aeo_reference: 'EIA. (2023, July). Download the National Energy Modeling System (NEMS). AEO2023_Reference_case_CDM_technology_menu_ktekx [dataset]. https://www.eia.gov/outlooks/aeo/info_nems_archive.php'
aeo_data_year: 2023
aeo_installed_year: 2012 # Year of installed base data
aeo_currency_year: 2022
aeo_currency: 'USD'

pop_reference: "Statistics Canada, (2025, January 21). Projected population, by projection scenario, age and gender, as of July 1. https://www150.statcan.gc.ca/t1/tbl1/en/cv.action?pid=1710005701"
pop_data_year: 2025

gdp_url: 'https://www.cer-rec.gc.ca/open/energy/energyfutures2023/macro-indicators-2023.csv'
gdp_reference: 'CER (2023). Canadas Energy Future 2023: Energy Supply and Demand Projections to 2050 - macro-indicators-2023. https://open.canada.ca/data/en/dataset/5a6abd9d-d343-41ef-a525-7a1efb686300/resource/ac214892-e9d1-46c1-a6f9-c2130c5e9b51'
gdp_data_year: 2023

epa_reference: "US EPA. (2025, January). GHG Emission Factors Hub [Overviews and Factsheets]. https://www.epa.gov/climateleadership/ghg-emission-factors-hub"
epa_year: 2025 # If updating, check if GWP factors have changed and update below
epa_url: 'https://www.epa.gov/system/files/other-files/2025-01/ghg-emission-factors-hub-2025.xlsx'
emission_commodity: 'co2e'
emission_activity_units: 'ktCO2e/PJ'

conversion_factors:
  epa_units:
    'CO2': 0.948 # kg/MMBtu to kt/PJ
    'CH4': 0.000948 # g/MMBtu to kt/PJ
    'N2O': 0.000948 # g/MMBtu to kt/PJ
  gwp:
    'CO2': 1 # to CO2eq 100y GWP
    'CH4': 28 # to CO2eq 100y GWP
    'N2O': 265 # to CO2eq 100y GWP
  efficiency:
    'EER': 0.293 # kBtu/kWh to PJ/PJ
  cost:
    'aeo': 0.108198 # $/(kBtu/h) to M$/(PJ/y)

