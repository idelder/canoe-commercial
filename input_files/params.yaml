    - 'hospital'
    - 'largehotel'
    - 'largeoffice'
    - 'mediumoffice'
    - 'outpatient'
    - 'primaryschool'
    - 'quickservicerestaurant'
    - 'retailstandalone'
    - 'retailstripmall'
    - 'secondaryschool'
    - 'smallhotel'
    - 'smalloffice'
    - 'warehouse'
  data_year: 2024
  reference: 'NREL. (2024). ComStock-NREL (amy2018, v2, upgrade 39). https://data.openei.org/s3_viewer?bucket=oedi-data-lake'

weather:
