  url: 'https://oedi-data-lake.s3.amazonaws.com/nrel-pds-building-stock/end-use-load-profiles-for-us-building-stock/2024/comstock_amy2018_release_2/timeseries_aggregates/by_state/upgrade%3D39/state%3D<su>/up39-<sl>-<b>.csv'
  building_types:
